<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#2f6f6f">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ルーティン">
<link rel="apple-touch-icon" href="icon-180.png">
<title>ルーティン</title>
<style>
  :root{
    --bg:#f4f6f6;
    --card:#ffffff;
    --ink:#1f2a2a;
    --sub:#6b7a7a;
    --accent:#2f6f6f;
    --accent-d:#245757;
    --late:#d6453d;
    --late-bg:#fdeceb;
    --line:#e4e9e9;
    --shadow:0 1px 3px rgba(0,0,0,.07);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
    background:var(--bg);color:var(--ink);
    font-size:16px;line-height:1.5;
    padding-bottom:90px;
  }
  header{
    position:sticky;top:0;z-index:10;
    background:var(--accent);color:#fff;
    padding:14px 16px;
    box-shadow:0 1px 4px rgba(0,0,0,.12);
  }
  header h1{margin:0;font-size:18px;font-weight:700;letter-spacing:.02em;}
  header .date{font-size:12px;opacity:.85;margin-top:2px;}
  .tabs{
    display:flex;background:var(--card);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:5;
  }
  .tab{
    flex:1;text-align:center;padding:12px 0;font-size:14px;font-weight:600;
    color:var(--sub);border-bottom:2px solid transparent;cursor:pointer;
  }
  .tab.active{color:var(--accent);border-bottom-color:var(--accent);}
  main{padding:14px 12px;max-width:560px;margin:0 auto;}
  .empty{
    text-align:center;color:var(--sub);font-size:14px;
    padding:48px 20px;line-height:1.8;
  }
  .empty .big{font-size:40px;margin-bottom:8px;}
  /* cards */
  .card{
    background:var(--card);border-radius:14px;box-shadow:var(--shadow);
    padding:14px;margin-bottom:10px;border:1px solid var(--line);
  }
  .card.late{border-color:#f3c9c6;}
  .card .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;}
  .card .name{font-size:16px;font-weight:700;word-break:break-word;}
  .card .meta{font-size:12px;color:var(--sub);margin-top:3px;}
  .badge{
    flex:none;font-size:12px;font-weight:700;border-radius:999px;
    padding:4px 10px;white-space:nowrap;
  }
  .badge.today{background:#e8f3f0;color:var(--accent-d);}
  .badge.soft{background:#eef2f2;color:var(--sub);}
  .badge.warn{background:#fdf0db;color:#a9760a;}
  .badge.late{background:var(--late-bg);color:var(--late);}
  .card .actions{display:flex;gap:8px;margin-top:12px;align-items:center;}
  .card .actions input[type=date]{
    flex:1;min-width:0;font-size:14px;padding:8px;border:1px solid var(--line);
    border-radius:9px;background:#fafbfb;color:var(--ink);font-family:inherit;
  }
  .btn{
    border:none;border-radius:9px;font-family:inherit;font-weight:700;
    font-size:14px;padding:9px 14px;cursor:pointer;
  }
  .btn.done{background:var(--accent);color:#fff;flex:none;}
  .btn.done:active{background:var(--accent-d);}
  /* list (manage) */
  .listrow{
    background:var(--card);border-radius:12px;box-shadow:var(--shadow);
    border:1px solid var(--line);padding:12px 14px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .listrow .name{font-weight:700;font-size:15px;}
  .listrow .meta{font-size:12px;color:var(--sub);margin-top:2px;}
  .listrow .edit{
    flex:none;font-size:13px;color:var(--accent);font-weight:700;
    background:#eef4f3;border:none;border-radius:8px;padding:7px 12px;cursor:pointer;
  }
  /* FAB */
  .fab{
    position:fixed;right:18px;bottom:22px;z-index:20;
    width:58px;height:58px;border-radius:50%;border:none;
    background:var(--accent);color:#fff;font-size:30px;line-height:58px;
    box-shadow:0 4px 12px rgba(47,111,111,.45);cursor:pointer;
  }
  .fab:active{background:var(--accent-d);}
  /* modal */
  .overlay{
    position:fixed;inset:0;background:rgba(20,30,30,.45);z-index:30;
    display:none;align-items:center;justify-content:center;
    padding:16px;
  }
  .overlay.open{display:flex;}
  .sheet{
    background:var(--card);width:100%;max-width:520px;
    border-radius:18px;
    max-height:90vh;max-height:calc(100dvh - 32px);overflow-y:auto;
    padding:18px 16px 20px;
    box-shadow:0 6px 28px rgba(0,0,0,.28);
    animation:pop .18s ease;
  }
  @keyframes pop{from{transform:scale(.97);opacity:.5;}to{transform:none;opacity:1;}}
  .sheet h2{margin:0 0 14px;font-size:17px;}
  .field{margin-bottom:14px;}
  .field label{display:block;font-size:13px;color:var(--sub);font-weight:600;margin-bottom:5px;}
  .field input,.field select{
    width:100%;font-size:16px;padding:11px;border:1px solid var(--line);
    border-radius:10px;background:#fafbfb;font-family:inherit;color:var(--ink);
  }
  .field .hint{font-size:11.5px;color:var(--sub);margin-top:5px;line-height:1.5;}
  .field input.invalid{border-color:var(--late);background:var(--late-bg);}
  .err{color:var(--late);font-size:13px;font-weight:600;margin:-4px 0 12px;min-height:18px;}
  .sheet .row{display:flex;gap:10px;margin-top:6px;}
  .btn.primary{background:var(--accent);color:#fff;flex:1;padding:13px;}
  .btn.ghost{background:#eef1f1;color:var(--ink);flex:none;padding:13px 16px;}
  .btn.danger{background:var(--late-bg);color:var(--late);width:100%;padding:11px;margin-top:4px;}
  /* history */
  .logrow{
    background:var(--card);border-radius:12px;box-shadow:var(--shadow);
    border:1px solid var(--line);padding:11px 14px;margin-bottom:8px;
    display:flex;justify-content:space-between;align-items:center;gap:10px;
  }
  .logrow .ldate{font-weight:700;font-size:15px;color:var(--accent-d);min-width:48px;}
  .logrow .lname{font-weight:600;font-size:15px;}
  .logrow .lsub{font-size:11.5px;color:var(--sub);margin-top:2px;}
  .logrow .undo{
    flex:none;font-size:12px;color:var(--sub);font-weight:600;
    background:#f0f2f2;border:none;border-radius:8px;padding:6px 10px;cursor:pointer;
  }
  .hist{font-size:13px;color:var(--ink);background:#fafbfb;border:1px solid var(--line);
    border-radius:10px;padding:10px;max-height:140px;overflow-y:auto;line-height:1.7;}
  .hist .none{color:var(--sub);}
  /* backup */
  .backup{margin-top:18px;padding:14px;background:var(--card);border:1px solid var(--line);
    border-radius:12px;box-shadow:var(--shadow);}
  .backup .bk-title{font-weight:700;font-size:14px;margin-bottom:10px;}
  .backup .bk-row{display:flex;gap:10px;}
  .btn.bk{flex:1;background:#eef4f3;color:var(--accent-d);padding:11px;}
  .btn.bk:active{background:#e0eceb;}
  .backup .bk-hint{font-size:11.5px;color:var(--sub);margin-top:9px;line-height:1.6;}
</style>
</head>
<body>
<header>
  <h1>ルーティン</h1>
  <div class="date" id="todayLabel"></div>
</header>
<div class="tabs">
  <div class="tab active" data-tab="todo" id="tabTodo">今やること</div>
  <div class="tab" data-tab="all" id="tabAll">一覧</div>
  <div class="tab" data-tab="log" id="tabLog">履歴</div>
</div>
<main id="view"></main>

<button class="fab" id="addBtn">＋</button>

<div class="overlay" id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
"use strict";

/* ---------- 周期の定義 ---------- */
const INTERVALS = [
  {key:'1w',  label:'毎週',       unit:'day',   n:7},
  {key:'2w',  label:'隔週',       unit:'day',   n:14},
  {key:'3w',  label:'3週間ごと',  unit:'day',   n:21},
  {key:'1mo', label:'毎月',       unit:'month', n:1},
  {key:'2mo', label:'2ヶ月ごと',  unit:'month', n:2},
  {key:'3mo', label:'3ヶ月ごと',  unit:'month', n:3},
  {key:'4mo', label:'4ヶ月ごと',  unit:'month', n:4},
  {key:'6mo', label:'半年ごと',   unit:'month', n:6},
  {key:'1y',  label:'毎年',       unit:'year',  n:1},
  {key:'2y',  label:'2年ごと',    unit:'year',  n:2},
  {key:'3y',  label:'3年ごと',    unit:'year',  n:3},
  {key:'5y',  label:'5年ごと',    unit:'year',  n:5},
];
const ivLabel = k => (INTERVALS.find(x=>x.key===k)||{}).label || '';

/* ---------- 日付ユーティリティ ---------- */
function todayMid(){ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),t.getDate()); }
function parseDate(s){ const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }
function fmt(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function fmtJp(d){ return (d.getMonth()+1)+'月'+d.getDate()+'日'; }
function fmtMd(d){ return (d.getMonth()+1)+'/'+d.getDate(); }
function daysBetween(a,b){ return Math.round((a-b)/86400000); }
// 締切＝次の発生日の前日（＝現在の発生日＋周期−1日）
function deadlineDate(nextDueStr, interval){
  const d = addInterval(parseDate(nextDueStr), interval);
  d.setDate(d.getDate()-1);
  return d;
}

function addMonths(date, n){
  const day = date.getDate();
  date.setDate(1);
  date.setMonth(date.getMonth()+n);
  const last = new Date(date.getFullYear(), date.getMonth()+1, 0).getDate();
  date.setDate(Math.min(day, last));
}
function addInterval(d, key){
  const iv = INTERVALS.find(x=>x.key===key);
  const r = new Date(d.getFullYear(), d.getMonth(), d.getDate());
  if(iv.unit==='day')        r.setDate(r.getDate()+iv.n);
  else if(iv.unit==='month') addMonths(r, iv.n);
  else                       addMonths(r, iv.n*12);
  return r;
}

/* ---------- データ ---------- */
const KEY='routine-app-v1';
let routines = load();
let tab='todo';

function load(){
  let arr=[];
  try{ arr = JSON.parse(localStorage.getItem(KEY))||[]; }catch(e){ arr=[]; }
  return arr.map(normalize).filter(Boolean);
}
// 旧形式{nextDue,lastDone}も新形式{anchor,history}へ移行
function normalize(r){
  if(!r || !r.id) return null;
  return {
    id: r.id,
    name: r.name || '',
    interval: r.interval || '1mo',
    anchor: r.anchor || r.nextDue || fmt(todayMid()), // 基準の発生日（ここから周期ごとに発生）
    history: Array.isArray(r.history) ? r.history.filter(h=>h&&h.due&&h.done) : []
  };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(routines)); }
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }

/* ---------- 発生（案件）の生成 ----------
   発生日は anchor, anchor+周期, anchor+2*周期 ... の固定グリッド。
   完了済み(historyにdueがある)を除き、発生日<=今日 のものを「今やること」に出す。 */
function pendingOccurrences(r, today){
  const done = new Set(r.history.map(h=>h.due));
  const res=[]; let d=parseDate(r.anchor); let guard=0;
  while(d<=today && guard<1000){
    const ds=fmt(d);
    if(!done.has(ds)) res.push(ds);
    d=addInterval(d, r.interval); guard++;
  }
  return res;
}
// 次に対応すべき発生日（未完了の最初の発生＝遅れがあればそれ、無ければ次の予定）
function nextOccurrence(r, today){
  const done = new Set(r.history.map(h=>h.due));
  let d=parseDate(r.anchor); let guard=0;
  while(guard<3000){
    const ds=fmt(d);
    if(!done.has(ds)) return ds;
    d=addInterval(d, r.interval); guard++;
  }
  return r.anchor;
}
function lastDoneOf(r){
  if(!r.history.length) return null;
  return r.history.reduce((m,h)=> h.done>m ? h.done : m, r.history[0].done);
}

/* ---------- 完了 / 取り消し ---------- */
function complete(rid, due, doneStr){
  const r = routines.find(x=>x.id===rid); if(!r) return;
  if(!r.history.some(h=>h.due===due)){
    r.history.push({ due, done: doneStr || fmt(todayMid()) });
  }
  save(); render();
}
function undoHistory(rid, due){
  const r = routines.find(x=>x.id===rid); if(!r) return;
  r.history = r.history.filter(h=> h.due!==due); // その発生を未完了に戻す
  save(); render();
}

/* ---------- 追加・編集・削除 ---------- */
function addRoutine(name, interval, startStr){
  const anchor = startStr ? startStr : fmt(todayMid()); // 発生日を直接指定。空欄なら今日から
  routines.push({ id:uid(), name, interval, anchor, history:[] });
  save(); render();
}
function updateRoutine(id, name, interval, anchorStr){
  const r = routines.find(x=>x.id===id); if(!r) return;
  r.name=name; r.interval=interval; r.anchor=anchorStr;
  save(); render();
}
function deleteRoutine(id){
  routines = routines.filter(x=>x.id!==id);
  save(); render();
}

/* ---------- バックアップ（書き出し / 読み込み） ---------- */
function exportData(){
  const payload = { app:'my-routine', version:1, exportedAt:new Date().toISOString(), routines };
  const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'routine-backup-' + fmt(todayMid()) + '.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(url), 1500);
}
function importData(file){
  const reader = new FileReader();
  reader.onload = ()=>{
    let data;
    try{ data = JSON.parse(reader.result); }
    catch(e){ alert('読み込めませんでした（JSONとして正しくありません）'); return; }
    const arr = Array.isArray(data) ? data : (data && data.routines);
    if(!Array.isArray(arr)){ alert('このファイルにルーティンのデータが見つかりませんでした'); return; }
    const incoming = arr.map(normalize).filter(Boolean);
    if(!incoming.length){ alert('有効なルーティンが含まれていませんでした'); return; }
    if(!confirm('今のデータ（'+routines.length+'件）を、読み込む内容（'+incoming.length+'件）で置き換えます。よろしいですか？')) return;
    routines = incoming; save(); render();
    alert(incoming.length+'件を読み込みました。');
  };
  reader.readAsText(file);
}

/* ---------- 描画 ---------- */
function render(){
  document.getElementById('todayLabel').textContent = '今日は ' + fmtJp(todayMid());
  document.getElementById('tabTodo').classList.toggle('active', tab==='todo');
  document.getElementById('tabAll').classList.toggle('active', tab==='all');
  document.getElementById('tabLog').classList.toggle('active', tab==='log');
  const view = document.getElementById('view');
  view.innerHTML = tab==='todo' ? renderTodo() : tab==='all' ? renderAll() : renderLog();
  bind();
}

const emptyMsg = `<div class="empty"><div class="big">🗒️</div>まだルーティンがありません。<br>右下の ＋ から登録しましょう。</div>`;

function renderTodo(){
  const today = todayMid();
  if(routines.length===0) return emptyMsg;
  // 全ルーティンの未完了の発生（案件）を集めて、発生が古い順に並べる
  let items=[];
  routines.forEach(r=>{
    pendingOccurrences(r, today).forEach(due=> items.push({r, due}));
  });
  if(items.length===0){
    return `<div class="empty"><div class="big">✅</div>今やることはありません。<br>すべて完了しています。</div>`;
  }
  items.sort((a,b)=> parseDate(a.due) - parseDate(b.due));
  const tStr = fmt(today);
  return items.map(({r, due})=>{
    const dl = deadlineDate(due, r.interval);
    const daysLeft = daysBetween(dl, today); // 締切 − 今日
    let badge, isLate=false;
    if(daysLeft < 0){ isLate=true; badge = `<span class="badge late">${-daysLeft}日遅れ</span>`; }
    else if(daysLeft === 0){ badge = `<span class="badge warn">締切 今日</span>`; }
    else { badge = `<span class="badge soft">あと${daysLeft}日</span>`; }
    return `
    <div class="card ${isLate?'late':''}">
      <div class="top">
        <div>
          <div class="name">${esc(r.name)}</div>
          <div class="meta">${ivLabel(r.interval)} ・ 発生 ${fmtMd(parseDate(due))} ・ 締切 ${fmtMd(dl)}</div>
        </div>
        ${badge}
      </div>
      <div class="actions">
        <input type="date" value="${tStr}">
        <button class="btn done" data-done="1" data-rid="${r.id}" data-due="${due}">完了</button>
      </div>
    </div>`;
  }).join('');
}

function renderAll(){
  const today = todayMid();
  let listHtml;
  if(routines.length===0){
    listHtml = `<div class="empty" style="padding:32px 20px;"><div class="big">🗒️</div>まだルーティンがありません。<br>右下の ＋ から登録、または下の「読み込む」で復元できます。</div>`;
  }else{
    const sorted = [...routines].sort((a,b)=> parseDate(nextOccurrence(a,today)) - parseDate(nextOccurrence(b,today)));
    listHtml = sorted.map(r=>{
      const nx = nextOccurrence(r, today);
      const ld = lastDoneOf(r);
      const last = ld ? '前回 '+fmtMd(parseDate(ld)) : '前回 なし';
      return `
      <div class="listrow">
        <div>
          <div class="name">${esc(r.name)}</div>
          <div class="meta">${ivLabel(r.interval)} ・ 次回発生 ${fmtMd(parseDate(nx))} ・ 締切 ${fmtMd(deadlineDate(nx, r.interval))} ・ 実施${r.history.length}回 ・ ${last}</div>
        </div>
        <button class="edit" data-edit="${r.id}">編集</button>
      </div>`;
    }).join('');
  }
  return listHtml + `
    <div class="backup">
      <div class="bk-title">データのバックアップ</div>
      <div class="bk-row">
        <button class="btn bk" id="btn-export">書き出す（保存）</button>
        <button class="btn bk" id="btn-import">読み込む（復元）</button>
      </div>
      <div class="bk-hint">データはこの端末のブラウザ内だけにあります。機種変更・URL変更・データ消去で消えないよう、ときどき「書き出す」で<b>ファイル(iCloud)</b>に保存しておくと安心です。復元は「読み込む」から。</div>
    </div>
    <input type="file" id="file-import" accept="application/json,.json" style="display:none">`;
}

function renderLog(){
  if(routines.length===0) return emptyMsg;
  let entries=[];
  routines.forEach(r=> r.history.forEach(h=> entries.push({rid:r.id, name:r.name, due:h.due, done:h.done})));
  if(entries.length===0){
    return `<div class="empty"><div class="big">🕘</div>まだ履歴がありません。<br>「今やること」で完了すると、ここに溜まっていきます。</div>`;
  }
  entries.sort((a,b)=> parseDate(b.done) - parseDate(a.done)); // 新しい順
  return entries.map(e=>`
    <div class="logrow">
      <div class="ldate">${fmtMd(parseDate(e.done))}</div>
      <div style="flex:1;min-width:0;">
        <div class="lname">${esc(e.name)}</div>
        <div class="lsub">実施 ${fmtJp(parseDate(e.done))}（発生 ${fmtMd(parseDate(e.due))}）</div>
      </div>
      <button class="undo" data-undo="1" data-rid="${e.rid}" data-due="${e.due}">取り消し</button>
    </div>`).join('');
}

function esc(s){ return s.replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// 編集画面に出すこのルーティンの実施履歴（新しい順）
function histLines(r){
  if(!r.history.length) return `<span class="none">まだありません</span>`;
  return [...r.history]
    .sort((a,b)=> parseDate(b.done) - parseDate(a.done))
    .map(h=> `${fmtMd(parseDate(h.done))}（発生 ${fmtMd(parseDate(h.due))}）`)
    .join('<br>');
}

/* ---------- イベント ---------- */
function bind(){
  document.querySelectorAll('[data-done]').forEach(b=>{
    b.onclick = ()=>{
      const di = b.closest('.card').querySelector('input[type=date]');
      complete(b.dataset.rid, b.dataset.due, di.value || fmt(todayMid()));
    };
  });
  document.querySelectorAll('[data-edit]').forEach(b=>{
    b.onclick = ()=> openEdit(b.dataset.edit);
  });
  document.querySelectorAll('[data-undo]').forEach(b=>{
    b.onclick = ()=> undoHistory(b.dataset.rid, b.dataset.due);
  });
  const exp=document.getElementById('btn-export');
  if(exp) exp.onclick = exportData;
  const imp=document.getElementById('btn-import'), fi=document.getElementById('file-import');
  if(imp && fi){
    imp.onclick = ()=> fi.click();
    fi.onchange = ()=>{ if(fi.files && fi.files[0]) importData(fi.files[0]); fi.value=''; };
  }
}
document.getElementById('tabTodo').onclick = ()=>{ tab='todo'; render(); };
document.getElementById('tabAll').onclick  = ()=>{ tab='all';  render(); };
document.getElementById('tabLog').onclick  = ()=>{ tab='log';  render(); };
document.getElementById('addBtn').onclick  = openAdd;

/* ---------- モーダル ---------- */
const overlay=document.getElementById('overlay');
const sheet=document.getElementById('sheet');
function closeSheet(){ overlay.classList.remove('open'); sheet.innerHTML=''; }
overlay.onclick = e=>{ if(e.target===overlay) closeSheet(); };

function intervalOptions(sel){
  return INTERVALS.map(iv=>`<option value="${iv.key}" ${iv.key===sel?'selected':''}>${iv.label}</option>`).join('');
}

function openAdd(){
  sheet.innerHTML = `
    <h2>ルーティンを追加</h2>
    <div class="field">
      <label>やること</label>
      <input id="f-name" placeholder="例：換気扇の掃除" autocomplete="off">
    </div>
    <div class="field">
      <label>周期</label>
      <select id="f-iv">${intervalOptions('1mo')}</select>
    </div>
    <div class="field">
      <label>発生日（任意）</label>
      <input type="date" id="f-start">
      <div class="hint">この日から「今やること」に出ます。締切は「発生日＋周期−1日」で自動。<br>空欄なら今日から出ます。</div>
      <div class="hint" id="f-dlprev"></div>
    </div>
    <div class="err" id="f-err"></div>
    <div class="row">
      <button type="button" class="btn ghost" id="f-cancel">やめる</button>
      <button type="button" class="btn primary" id="f-save">追加する</button>
    </div>`;
  overlay.classList.add('open');
  const nameEl=document.getElementById('f-name');
  const errEl=document.getElementById('f-err');
  const startEl=document.getElementById('f-start');
  const ivEl=document.getElementById('f-iv');
  const dlPrev=document.getElementById('f-dlprev');
  function updatePrev(){
    const start = startEl.value || fmt(todayMid());
    const dl = deadlineDate(start, ivEl.value);
    dlPrev.textContent = `→ 発生 ${fmtMd(parseDate(start))} ・ 締切 ${fmtMd(dl)}`;
  }
  startEl.oninput=updatePrev; ivEl.onchange=updatePrev; updatePrev();
  function submit(){
    const name=nameEl.value.trim();
    if(!name){
      errEl.textContent='「やること」を入力してください';
      nameEl.classList.add('invalid'); nameEl.focus();
      return;
    }
    addRoutine(name, ivEl.value, startEl.value);
    closeSheet();
  }
  nameEl.oninput=()=>{ errEl.textContent=''; nameEl.classList.remove('invalid'); };
  nameEl.onkeydown=(e)=>{ if(e.key==='Enter') submit(); };
  document.getElementById('f-cancel').onclick = closeSheet;
  document.getElementById('f-save').onclick = submit;
  nameEl.focus();
}

function openEdit(id){
  const r=routines.find(x=>x.id===id); if(!r) return;
  sheet.innerHTML = `
    <h2>ルーティンを編集</h2>
    <div class="field">
      <label>やること</label>
      <input id="f-name" value="${esc(r.name)}" autocomplete="off">
    </div>
    <div class="field">
      <label>周期</label>
      <select id="f-iv">${intervalOptions(r.interval)}</select>
    </div>
    <div class="field">
      <label>発生日（基準）</label>
      <input type="date" id="f-next" value="${r.anchor}">
      <div class="hint">この日を起点に、周期ごとに発生日が作られます。締切は「発生日＋周期−1日」で自動。</div>
      <div class="hint" id="f-dlprev"></div>
    </div>
    <div class="field">
      <label>実施履歴（${r.history.length}回）</label>
      <div class="hist">${histLines(r)}</div>
    </div>
    <div class="row">
      <button class="btn ghost" id="f-cancel">やめる</button>
      <button class="btn primary" id="f-save">保存する</button>
    </div>
    <button class="btn danger" id="f-del">このルーティンを削除</button>`;
  overlay.classList.add('open');
  const nextEl=document.getElementById('f-next');
  const ivEl=document.getElementById('f-iv');
  const dlPrev=document.getElementById('f-dlprev');
  function updatePrev(){
    if(!nextEl.value){ dlPrev.textContent=''; return; }
    const dl=deadlineDate(nextEl.value, ivEl.value);
    dlPrev.textContent = `→ 発生 ${fmtMd(parseDate(nextEl.value))} ・ 締切 ${fmtMd(dl)}`;
  }
  nextEl.oninput=updatePrev; ivEl.onchange=updatePrev; updatePrev();
  document.getElementById('f-cancel').onclick = closeSheet;
  document.getElementById('f-save').onclick = ()=>{
    const name=document.getElementById('f-name').value.trim();
    if(!name){ document.getElementById('f-name').focus(); return; }
    updateRoutine(id, name, ivEl.value, nextEl.value);
    closeSheet();
  };
  document.getElementById('f-del').onclick = ()=>{
    if(confirm('「'+r.name+'」を削除しますか？')){ deleteRoutine(id); closeSheet(); }
  };
}

render();
</script>
</body>
</html>
